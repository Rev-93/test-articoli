services:
  - type: web
    name: test-articoli
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: test-articoli-db
          property: connectionString
    autoDeploy: true

databases:
  - name: test-articoli-db
    plan: free
